site_name: Daycry JWT
site_description: JWT (JSON Web Token) library for CodeIgniter 4 built on lcobucci/jwt 5 — HMAC, RSA and ECDSA, immutable façade, key rotation.
site_author: Daycry
site_url: https://daycry.github.io/jwt/
copyright: Copyright &copy; 2026 Daycry

repo_url: https://github.com/daycry/jwt
repo_name: daycry/jwt
edit_uri: edit/development/docs/

docs_dir: docs

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.action.edit
    - content.action.view
    - navigation.footer
    - navigation.path
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      extend_pygments_lang:
        - name: php
          lang: php
          options:
            startinline: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Fail `mkdocs build --strict` on any broken internal link or anchor.
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

# Internal planning docs and the GitHub folder README are not part of the site.
exclude_docs: |
  README.md

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/daycry/jwt
    - icon: fontawesome/brands/php
      link: https://packagist.org/packages/daycry/jwt

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Usage: usage.md
  - Advanced: advanced.md
  - CLI Commands: commands.md
  - Security:
      - Threat Model: threat-model.md
  - Testing: testing.md
  - Migration v2 → v3: migration-v2-to-v3.md
