version: 2
updates:
  # Composer dependencies (lcobucci/jwt, codeigniter4/framework, dev tooling).
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies

  # Pinned GitHub Actions used by the CI/Docs workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
